<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - MovieVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0e14] flex items-center justify-center min-h-screen p-4 text-white">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-2">
                <a href="/browse"><i class="fas fa-film text-amber-500 text-4xl border-2 border-amber-500 p-2 rounded-lg"></i></a>
                <a href="/browse"><h1 class="text-4xl font-bold">MovieVault</h1></a>
            </div>
            <p class="text-gray-400">Your personal movie collection</p>
        </div>

        <div class="bg-[#0b0e14]/50 border border-gray-700 rounded-2xl p-8 shadow-2xl">
            <div class="flex bg-[#0f172a] rounded-xl p-1 mb-8">
                <div class="flex-1 text-center py-2 bg-amber-600 rounded-lg font-bold shadow-lg">Sign In</div>
                <a href="/signup" class="flex-1 text-center py-2 text-gray-400 font-medium">Sign Up</a>
            </div>

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                    <input type="email" name="email" id="email" placeholder="Enter your email" required
                           class="w-full bg-transparent border border-gray-600 rounded-xl py-3 px-4 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required
                           class="w-full bg-transparent border border-gray-600 rounded-xl py-3 px-4 focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition">
                </div>

                <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 text-white py-4 rounded-xl font-bold transition shadow-lg active:scale-[0.98] mt-4">
                    Sign In
                </button>
            </form>
        </div>
    </div>

</body>
</html>
