{% extends "base.html" %}

{% block content %}
<header class="mb-12">
    <h2 class="text-6xl font-serif text-white mb-2">My Collection</h2>
    <p class="text-gray-500 text-lg">Your saved and favorite movies</p>
</header>

<div class="flex bg-[#111827]/50 p-1.5 rounded-2xl w-fit mb-24 border border-gray-800/50">
    <button class="bg-amber-500 text-[#0b0e14] font-bold py-2.5 px-6 rounded-xl flex items-center gap-2 shadow-lg shadow-amber-500/10">
        <i class="fas fa-bookmark"></i> Bookmarks
    </button>
    <button class="text-gray-500 font-semibold py-2.5 px-6 rounded-xl flex items-center gap-2 hover:text-white transition">
        <i class="far fa-heart"></i> Favorites
    </button>
</div>

<div class="flex flex-col items-center justify-center py-40">
    <p class="text-gray-600 text-xl font-medium tracking-wide">No movies found</p>
</div>
{% endblock %}
