{% extends "base.html" %}

{% block title %}Discover - MovieVault{% endblock %}

{% block content %}
    <header class="mb-8">
        <h2 class="text-4xl font-bold mb-2">Discover Movies</h2>
        <p class="text-gray-400 mb-8">Explore our curated collection of films</p>

        <div class="flex gap-4">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="text" placeholder="Search movies..." 
                       class="w-full bg-[#1a1f29] border-none rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-yellow-600 outline-none">
            </div>
            <button class="bg-[#1a1f29] px-6 rounded-xl flex items-center gap-2 hover:bg-gray-700 transition">
                <i class="fas fa-sliders-h"></i> <span>All Genres</span>
            </button>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
{% for movie in movies %}
<a href="{{ url_for('movie_detail', movie_id=movie._id) }}" class="group block">
    <div class="relative aspect-[2/3] overflow-hidden rounded-2xl bg-[#1a1f29]">
        <img src="{{ movie.poster_url }}" alt="{{ movie.title }}" 
             class="w-full h-full object-cover transition duration-500 group-hover:scale-110 group-hover:opacity-40">
        
        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
            <div class="bg-amber-500 text-black w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transform scale-75 group-hover:scale-100 transition-transform duration-300">
                <i class="fas fa-play text-xl ml-1"></i>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <h3 class="font-bold text-white truncate group-hover:text-amber-500 transition-colors">{{ movie.title }}</h3>
        <div class="flex items-center justify-between mt-1">
            <span class="text-sm text-gray-500">{{ movie.year }}</span>
            <span class="text-sm text-amber-500 font-bold">
                <i class="fas fa-star text-xs"></i> {{ movie.rating }}
            </span>
        </div>
    </div>
</a>
{% endfor %}
    </div>
{% endblock %}
